# Values for Development environment
replicaCount: 1

image:
  # Keycloak oficial - sem custom theme por enquanto
  # Para usar theme customizado: localhost:5001/nexo-auth
  tag: "23.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: nexo-auth.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false

env:
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
  KC_HOSTNAME_STRICT: "false"
  KC_PROXY: "edge"
  KC_HTTP_ENABLED: "true"
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: "true"

podDisruptionBudget:
  enabled: false
