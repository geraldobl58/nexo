# Values for Staging environment
replicaCount: 1

image:
  tag: "staging"

ingress:
  enabled: true
  hosts:
    - host: auth.staging.nexo.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nexo-auth-staging-tls
      hosts:
        - auth.staging.nexo.io

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false

env:
  NODE_ENV: staging
  LOG_LEVEL: debug
