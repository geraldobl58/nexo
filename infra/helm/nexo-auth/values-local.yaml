# =============================================================================
# Values for Local K3D environment
# =============================================================================
# TEMPORÁRIO: Usando imagem oficial do Keycloak
# Quando a imagem customizada existir no DockerHub, mudar para:
#   repository: docker.io/geraldobl58/nexo-auth
#   tag: "develop"
#   pullPolicy: Always
# =============================================================================

replicaCount: 1

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.5"
  pullPolicy: IfNotPresent

imagePullSecrets: []

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.tls: "false"
    cert-manager.io/cluster-issuer: ""
  hosts:
    - host: auth.nexo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false

env:
  # Keycloak 26+ usa KC_BOOTSTRAP_ADMIN_*
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: admin
  KC_HOSTNAME_STRICT: "false"
  KC_PROXY: "edge"
  KC_HTTP_ENABLED: "true"
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: "true"

# Command para iniciar em modo dev (local)
command:
  - /opt/keycloak/bin/kc.sh
args:
  - start-dev
  - --http-enabled=true
  - --hostname-strict=false
  - --http-port=8080

# Porta de gerenciamento (health, metrics) - Keycloak 26+ usa porta 9000
managementPort: 9000

# Probes ajustados para Keycloak 26+ (usa porta de gerenciamento)
livenessProbe:
  httpGet:
    path: /health/live
    port: management
  initialDelaySeconds: 120
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 10

readinessProbe:
  httpGet:
    path: /health/ready
    port: management
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

podDisruptionBudget:
  enabled: false
