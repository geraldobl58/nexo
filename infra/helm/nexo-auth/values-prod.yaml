# Values for Production environment
replicaCount: 2

image:
  tag: "latest"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: auth.nexo.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nexo-auth-prod-tls
      hosts:
        - auth.nexo.io

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  NODE_ENV: production
  LOG_LEVEL: info
