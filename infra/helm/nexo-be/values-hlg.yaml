# Values for Homologation environment
replicaCount: 2

image:
  tag: "release"

ingress:
  enabled: true
  hosts:
    - host: api.hlg.nexo.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nexo-be-hlg-tls
      hosts:
        - api.hlg.nexo.io

resources:
  limits:
    cpu: 750m
    memory: 768Mi
  requests:
    cpu: 200m
    memory: 384Mi

autoscaling:
  enabled: false

env:
  NODE_ENV: homologation
  LOG_LEVEL: info
  SWAGGER_ENABLED: "true"
  METRICS_ENABLED: "true"
  KEYCLOAK_REALM: nexo-hlg

podDisruptionBudget:
  enabled: true
  minAvailable: 1
