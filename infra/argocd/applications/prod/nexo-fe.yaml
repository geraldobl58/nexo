# ============================================================================
# ArgoCD Application - Frontend (Production)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexo-fe-prod
  namespace: argocd
  labels:
    app: nexo-fe
    environment: prod
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: nexo-deploys
    notifications.argoproj.io/subscribe.on-sync-failed.slack: nexo-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nexo-prod

  source:
    repoURL: https://github.com/nexo/nexo.git
    targetRevision: main
    path: infra/helm/nexo-fe
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
      parameters:
        - name: image.tag
          value: "" # Set by CI/CD

  destination:
    server: https://kubernetes.default.svc
    namespace: nexo-prod

  # NO automated sync for production
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 10
