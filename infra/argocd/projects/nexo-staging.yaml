# ============================================================================
# ArgoCD Project - Staging Environment
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: nexo-staging
  namespace: argocd
  labels:
    environment: staging
    project: nexo
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Nexo Platform - Staging Environment"

  sourceRepos:
    - "https://github.com/*/nexo.git"

  destinations:
    - namespace: nexo-staging
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  roles:
    - name: deployer
      description: "Deployer access to staging environment"
      policies:
        - p, proj:nexo-staging:deployer, applications, get, nexo-staging/*, allow
        - p, proj:nexo-staging:deployer, applications, sync, nexo-staging/*, allow
        - p, proj:nexo-staging:deployer, logs, get, nexo-staging/*, allow
      groups:
        - nexo-deployers
        - nexo-sre

    - name: admin
      description: "Admin access to staging environment"
      policies:
        - p, proj:nexo-staging:admin, applications, *, nexo-staging/*, allow
      groups:
        - nexo-admins

  orphanedResources:
    warn: true
