# ============================================================================
# NEXO PLATFORM - CD Principal
# ============================================================================
# Workflow único de CD para todos os serviços e ambientes.
# Usa matrix strategy para deploy em múltiplos ambientes.
#
# Branch Flow: feature/* → develop → qa → staging → main (production)
# Deploy automático para: develop, qa, staging
# Deploy manual com aprovação para: main (production)
# ============================================================================

name: CD

on:
  # Deploy automático após CI bem-sucedido
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - staging
      - qa
      - develop

  # Deploy manual via workflow_dispatch
  workflow_dispatch:
    inputs:
      service:
        description: "Serviço a ser deployado"
        required: true
        type: choice
        options:
          - all
          - nexo-be
          - nexo-fe
          - nexo-auth
      environment:
        description: "Ambiente de deploy"
        required: true
        type: choice
        options:
          - dev
          - qa
          - staging
          - prod
      image_tag:
        description: "Tag da imagem (deixe vazio para usar a última)"
        required: false
        type: string

concurrency:
  group: cd-${{ github.workflow }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  # ============================================
  # Preparação
  # ============================================
  prepare:
    name: 🔧 Prepare
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      environment: ${{ steps.set-env.outputs.environment }}
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Services Matrix
        id: set-matrix
        run: |
          if [ "${{ github.event.inputs.service }}" == "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            echo 'services=["nexo-be", "nexo-fe", "nexo-auth"]' >> $GITHUB_OUTPUT
          else
            echo 'services=["${{ github.event.inputs.service }}"]' >> $GITHUB_OUTPUT
          fi

      - name: Set Environment
        id: set-env
        run: |
          if [ -z "${{ github.event.inputs.environment }}" ]; then
            # Auto-detect based on branch (from workflow_run)
            BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
            case "$BRANCH" in
              develop)
                echo "environment=dev" >> $GITHUB_OUTPUT
                ;;
              qa)
                echo "environment=qa" >> $GITHUB_OUTPUT
                ;;
              staging)
                echo "environment=staging" >> $GITHUB_OUTPUT
                ;;
              main)
                echo "environment=prod" >> $GITHUB_OUTPUT
                ;;
              *)
                echo "environment=dev" >> $GITHUB_OUTPUT
                ;;
            esac
          else
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Set Image Tag
        id: set-tag
        run: |
          if [ -z "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # Deploy Backend
  # ============================================
  deploy-backend:
    name: 🔵 Deploy Backend
    needs: prepare
    if: contains(fromJson(needs.prepare.outputs.services), 'nexo-be')
    uses: ./.github/workflows/_cd-reusable.yml
    with:
      service: nexo-be
      environment: ${{ needs.prepare.outputs.environment }}
      image_tag: ${{ needs.prepare.outputs.image_tag }}
      helm_chart_path: infra/helm/nexo-be
      values_file: infra/helm/nexo-be/values-${{ needs.prepare.outputs.environment }}.yaml
      namespace: nexo-${{ needs.prepare.outputs.environment }}
      auto_sync: ${{ needs.prepare.outputs.environment == 'dev' }}
      require_approval: ${{ needs.prepare.outputs.environment == 'prod' }}
    secrets: inherit

  # ============================================
  # Deploy Frontend
  # ============================================
  deploy-frontend:
    name: 🟢 Deploy Frontend
    needs: prepare
    if: contains(fromJson(needs.prepare.outputs.services), 'nexo-fe')
    uses: ./.github/workflows/_cd-reusable.yml
    with:
      service: nexo-fe
      environment: ${{ needs.prepare.outputs.environment }}
      image_tag: ${{ needs.prepare.outputs.image_tag }}
      helm_chart_path: infra/helm/nexo-fe
      values_file: infra/helm/nexo-fe/values-${{ needs.prepare.outputs.environment }}.yaml
      namespace: nexo-${{ needs.prepare.outputs.environment }}
      auto_sync: ${{ needs.prepare.outputs.environment == 'dev' }}
      require_approval: ${{ needs.prepare.outputs.environment == 'prod' }}
    secrets: inherit

  # ============================================
  # Deploy Nexo Auth (Keycloak Theme)
  # ============================================
  deploy-nexo-auth:
    name: 🟡 Deploy Nexo Auth
    needs: prepare
    if: contains(fromJson(needs.prepare.outputs.services), 'nexo-auth')
    uses: ./.github/workflows/_cd-reusable.yml
    with:
      service: nexo-auth
      environment: ${{ needs.prepare.outputs.environment }}
      image_tag: ${{ needs.prepare.outputs.image_tag }}
      helm_chart_path: infra/helm/nexo-auth
      values_file: infra/helm/nexo-auth/values-${{ needs.prepare.outputs.environment }}.yaml
      namespace: nexo-${{ needs.prepare.outputs.environment }}
      auto_sync: ${{ needs.prepare.outputs.environment == 'dev' }}
      require_approval: ${{ needs.prepare.outputs.environment == 'prod' }}
    secrets: inherit

  # ============================================
  # Relatório Final
  # ============================================
  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    needs: [prepare, deploy-backend, deploy-frontend, deploy-nexo-auth]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "# 🚀 CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.prepare.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ needs.prepare.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.deploy-backend.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Nexo Auth | ${{ needs.deploy-nexo-auth.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
