version: "3.9"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: nexo-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      # HTTP / DEV
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"

      # 🔥 HOT RELOAD DE THEME (SEM CACHE)
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"

    ports:
      - "8080:8080"

    volumes:
      # Dados do Keycloak
      - keycloak_data:/opt/keycloak/data

      # 🔥 Theme customizado (monorepo)
      - ./apps/keycloak/themes:/opt/keycloak/themes

      # 🔥 SPI customizado (Two-Step Registration)
      - ./keycloak-spi/target/keycloak-two-step-registration.jar:/opt/keycloak/providers/keycloak-two-step-registration.jar:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  keycloak_data:
