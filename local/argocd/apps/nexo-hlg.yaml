# ============================================================================
# Nexo Platform - ArgoCD Applications - Ambiente HLG (Homologação)
# ============================================================================
# Branch: develop
# Domínios: hlg.nexo.local, hlg.api.nexo.local, hlg.auth.nexo.local
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexo-be-hlg
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: nexo-be=docker.io/geraldobl58/nexo-be:develop
    argocd-image-updater.argoproj.io/nexo-be.update-strategy: digest
    argocd-image-updater.argoproj.io/nexo-be.pull-secret: secret:argocd/dockerhub-creds#creds
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: nexo-be
    environment: hlg
spec:
  project: nexo-hlg
  source:
    repoURL: https://github.com/geraldobl58/nexo.git
    targetRevision: develop
    path: infra/helm/nexo-be
    helm:
      valueFiles:
        - values.yaml
        - values-local.yaml
      parameters:
        - name: image.repository
          value: docker.io/geraldobl58/nexo-be
        - name: image.tag
          value: develop
        - name: image.pullPolicy
          value: Always
        - name: ingress.hosts[0].host
          value: hlg.api.nexo.local
        - name: imagePullSecrets[0].name
          value: dockerhub-creds
  destination:
    server: https://kubernetes.default.svc
    namespace: nexo-hlg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
