# ============================================================================
# ArgoCD Application - Nexo Auth (Keycloak) (Local)
# ============================================================================
# TEMPORÁRIO: Usando imagem oficial até o CI/CD buildar a customizada
# Depois que existir no DockerHub, descomentar as annotations do Image Updater
# ============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexo-auth-local
  namespace: argocd
  labels:
    app.kubernetes.io/name: nexo-auth
    environment: local
  # DESCOMENTAR quando a imagem existir no DockerHub:
  # annotations:
  #   argocd-image-updater.argoproj.io/image-list: nexo-auth=docker.io/geraldobl58/nexo-auth:develop
  #   argocd-image-updater.argoproj.io/nexo-auth.update-strategy: digest
  #   argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nexo-local

  source:
    repoURL: https://github.com/geraldobl58/nexo.git
    targetRevision: develop
    path: infra/helm/nexo-auth
    helm:
      valueFiles:
        - values.yaml
        - values-local.yaml
      parameters:
        # TEMPORÁRIO: Usando imagem oficial do Keycloak
        - name: image.repository
          value: "quay.io/keycloak/keycloak"
        - name: image.tag
          value: "26.5"
        - name: image.pullPolicy
          value: "IfNotPresent"
        - name: ingress.hosts[0].host
          value: "auth.nexo.local"
        # Keycloak 26+ usa porta 9000 para management/health
        - name: managementPort
          value: "9000"
        - name: livenessProbe.httpGet.port
          value: "9000"
        - name: readinessProbe.httpGet.port
          value: "9000"

  destination:
    server: https://kubernetes.default.svc
    namespace: nexo-local

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
