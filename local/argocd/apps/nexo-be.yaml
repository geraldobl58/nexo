# ============================================================================
# ArgoCD Application - Nexo Backend (Local)
# ============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexo-be-local
  namespace: argocd
  labels:
    app.kubernetes.io/name: nexo-be
    environment: local
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nexo-local

  source:
    repoURL: https://github.com/geraldobl58/nexo.git
    targetRevision: develop
    path: infra/helm/nexo-be
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      parameters:
        - name: image.repository
          value: "nexo-registry.localhost:5111/nexo-be"
        - name: image.tag
          value: "local"
        - name: image.pullPolicy
          value: "IfNotPresent"
        - name: ingress.hosts[0].host
          value: "api.nexo.local"

  destination:
    server: https://kubernetes.default.svc
    namespace: nexo-local

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
