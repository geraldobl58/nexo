# ============================================================================
# ArgoCD Application - Nexo Backend (Local)
# ============================================================================
# Image Updater monitora DockerHub e atualiza automaticamente
# ============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexo-be-local
  namespace: argocd
  labels:
    app.kubernetes.io/name: nexo-be
    environment: local
  annotations:
    # ArgoCD Image Updater - monitora DockerHub automaticamente
    argocd-image-updater.argoproj.io/image-list: nexo-be=docker.io/geraldobl58/nexo-be
    argocd-image-updater.argoproj.io/nexo-be.update-strategy: name
    argocd-image-updater.argoproj.io/nexo-be.allow-tags: regexp:^latest$
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nexo-local

  source:
    repoURL: https://github.com/geraldobl58/nexo.git
    targetRevision: develop
    path: infra/helm/nexo-be
    helm:
      valueFiles:
        - values.yaml
        - values-local.yaml
      parameters:
        - name: image.repository
          value: "docker.io/geraldobl58/nexo-be"
        - name: image.tag
          value: "latest"
        - name: image.pullPolicy
          value: "Always"
        - name: ingress.hosts[0].host
          value: "api.nexo.local"

  destination:
    server: https://kubernetes.default.svc
    namespace: nexo-local

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
