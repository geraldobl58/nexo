# ============================================================================
# Nexo Auth (Keycloak) - Values para Ambiente Local (K3D)
# ============================================================================
# Configuração otimizada para desenvolvimento local
# ============================================================================

replicaCount: 1

image:
  repository: nexo-auth
  pullPolicy: Never
  tag: "local"

# Keycloak specific config
command: []
args:
  - start-dev

containerPort: 8080

imagePullSecrets: []

# Ingress local
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
  hosts:
    - host: auth.nexo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resources reduzidos para local
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Probes ajustados para desenvolvimento
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5

# Environment variables para local
env:
  - name: KC_DB
    value: "postgres"
  - name: KC_DB_URL
    value: "jdbc:postgresql://postgresql:5432/keycloak"
  - name: KC_DB_USERNAME
    value: "keycloak"
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: db-password
  - name: KEYCLOAK_ADMIN
    value: "admin"
  - name: KEYCLOAK_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: admin-password
  - name: KC_HOSTNAME
    value: "auth.nexo.local"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "false"
  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KC_PROXY
    value: "edge"
  - name: KC_HEALTH_ENABLED
    value: "true"
  - name: KC_METRICS_ENABLED
    value: "true"
  - name: KC_SPI_THEME_STATIC_MAX_AGE
    value: "-1"
  - name: KC_SPI_THEME_CACHE_THEMES
    value: "false"
  - name: KC_SPI_THEME_CACHE_TEMPLATES
    value: "false"

# Autoscaling desabilitado para local
autoscaling:
  enabled: false

# PostgreSQL para Keycloak
postgresql:
  enabled: true
  auth:
    database: keycloak
    username: keycloak
    password: keycloak_local_password
  primary:
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
