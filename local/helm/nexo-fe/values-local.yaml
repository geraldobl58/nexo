# ============================================================================
# Nexo Frontend - Values para Ambiente Local (K3D)
# ============================================================================
# Configuração otimizada para desenvolvimento local
# ============================================================================

replicaCount: 1

image:
  repository: nexo-registry.localhost:5111/nexo-fe
  pullPolicy: Always
  tag: "local"

# Não precisa de imagePullSecrets para registry local
imagePullSecrets: []

# Ingress local
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: nexo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resources reduzidos para local
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# Probes ajustados para desenvolvimento
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3

# Environment variables para local
env:
  - name: NODE_ENV
    value: "development"
  - name: NEXT_PUBLIC_API_URL
    value: "http://api.nexo.local"
  - name: NEXT_PUBLIC_KEYCLOAK_URL
    value: "http://auth.nexo.local"
  - name: NEXT_PUBLIC_KEYCLOAK_REALM
    value: "nexo"
  - name: NEXT_PUBLIC_KEYCLOAK_CLIENT_ID
    value: "nexo-fe"

# Autoscaling desabilitado para local
autoscaling:
  enabled: false
