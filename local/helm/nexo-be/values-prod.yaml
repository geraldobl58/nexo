# Values for Production environment
replicaCount: 1

image:
  repository: ghcr.io/geraldobl58/nexo-be
  tag: "develop"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

ingress:
  enabled: true
  className: "nginx"
  annotations:
  hosts:
    - host: be.nexo.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

autoscaling:
  enabled: false

env:
  NODE_ENV: production
  PORT: "3000"
  LOG_LEVEL: warn
  SWAGGER_ENABLED: "true"
  METRICS_ENABLED: "true"
  KEYCLOAK_URL: "http://auth.nexo.local"
  KEYCLOAK_INTERNAL_URL: "http://nexo-auth-prod:8080"
  KEYCLOAK_REALM: nexo

envFrom: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1

podAnnotations:
  app.kubernetes.io/commit: "initial"

metrics:
  enabled: false
  path: /metrics
  serviceMonitor:
    enabled: false

# Kubernetes Secret com as credenciais do Cloudinary.
# Criar o secret antes de implantar:
#   kubectl create secret generic nexo-be-cloudinary -n nexo-prod \
#     --from-literal=CLOUDINARY_CLOUD_NAME=xxx \
#     --from-literal=CLOUDINARY_API_KEY=xxx \
#     --from-literal=CLOUDINARY_API_SECRET=xxx \
#     --from-literal=CLOUDINARY_FOLDER=nexo
envFrom:
  - secretRef: nexo-be-cloudinary
