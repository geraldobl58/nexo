# Values for Development environment
replicaCount: 1

image:
  repository: ghcr.io/geraldobl58/nexo-be
  tag: "develop-86b25cc84983eeda5cd14c13e21ffd069275d597"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

ingress:
  enabled: true
  className: "nginx"
  annotations:
  hosts:
    - host: develop-be.nexo.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

autoscaling:
  enabled: false

env:
  NODE_ENV: development
  PORT: "3000"
  LOG_LEVEL: debug
  SWAGGER_ENABLED: "true"
  METRICS_ENABLED: "true"
  KEYCLOAK_URL: "http://develop-auth.nexo.local"
  KEYCLOAK_INTERNAL_URL: "http://nexo-auth-develop:8080"
  KEYCLOAK_REALM: nexo

podDisruptionBudget:
  enabled: false

podAnnotations:
  app.kubernetes.io/commit: "86b25cc"

metrics:
  enabled: false
  path: /metrics
  serviceMonitor:
    enabled: false

# Kubernetes Secret com as credenciais do Cloudinary.
# Criar o secret antes de implantar:
#   kubectl create secret generic nexo-be-cloudinary -n nexo-develop \
#     --from-literal=CLOUDINARY_CLOUD_NAME=xxx \
#     --from-literal=CLOUDINARY_API_KEY=xxx \
#     --from-literal=CLOUDINARY_API_SECRET=xxx \
#     --from-literal=CLOUDINARY_FOLDER=nexo
envFrom:
  - secretRef: nexo-be-cloudinary
