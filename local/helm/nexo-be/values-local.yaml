# ============================================================================
# Nexo Backend - Values para Ambiente Local (K3D)
# ============================================================================
# Configuração otimizada para desenvolvimento local
# ============================================================================

replicaCount: 1

image:
  repository: nexo-registry.localhost:5111/nexo-be
  pullPolicy: Always
  tag: "local"

# Não precisa de imagePullSecrets para registry local
imagePullSecrets: []

# Ingress local
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: api.nexo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resources reduzidos para local
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# Probes ajustados para desenvolvimento
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3

# Environment variables para local
env:
  - name: NODE_ENV
    value: "development"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: nexo-secrets
        key: DATABASE_URL
  - name: KEYCLOAK_URL
    value: "http://nexo-auth:8080"
  - name: KEYCLOAK_REALM
    value: "nexo"
  - name: LOG_LEVEL
    value: "debug"

# Annotations para Prometheus scraping
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3001"
  prometheus.io/path: "/metrics"

# Autoscaling desabilitado para local
autoscaling:
  enabled: false

# PostgreSQL local (como sidecar ou externo)
postgresql:
  enabled: true
  auth:
    database: nexo_local
    username: nexo
    password: nexo_local_password
  primary:
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
