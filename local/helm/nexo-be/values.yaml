replicaCount: 1

image:
  repository: ghcr.io/geraldobl58/nexo-be
  tag: "latest"
  pullPolicy: Always

imagePullSecrets: []

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: api.nexo.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

livenessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env: []

# Lista de Kubernetes Secrets para injetar como variáveis de ambiente via envFrom.
# Cada item deve ter um campo `secretRef` com o nome do Secret.
# Exemplo:
#   envFrom:
#     - secretRef: nexo-be-cloudinary
# Para criar o secret no cluster:
#   kubectl create secret generic nexo-be-cloudinary -n <namespace> \
#     --from-literal=CLOUDINARY_CLOUD_NAME=xxx \
#     --from-literal=CLOUDINARY_API_KEY=xxx \
#     --from-literal=CLOUDINARY_API_SECRET=xxx \
#     --from-literal=CLOUDINARY_FOLDER=nexo
envFrom: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1

podAnnotations: {}

metrics:
  enabled: false
  path: /metrics
  serviceMonitor:
    enabled: false
