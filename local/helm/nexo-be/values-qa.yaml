# Values for QA environment
replicaCount: 1

image:
  repository: ghcr.io/geraldobl58/nexo-be
  tag: "qa-1bd1d6f653726e62406dee2410fe5a33e2db4f26"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

ingress:
  enabled: true
  className: "nginx"
  annotations:
  hosts:
    - host: qa-be.nexo.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

autoscaling:
  enabled: false

env:
  NODE_ENV: production
  PORT: "3000"
  LOG_LEVEL: info
  SWAGGER_ENABLED: "true"
  METRICS_ENABLED: "true"
  KEYCLOAK_URL: "http://qa-auth.nexo.local"
  KEYCLOAK_INTERNAL_URL: "http://nexo-auth-qa:8080"
  KEYCLOAK_REALM: nexo

podDisruptionBudget:
  enabled: false

podAnnotations:
  app.kubernetes.io/commit: "1bd1d6f"

metrics:
  enabled: false
  path: /metrics
  serviceMonitor:
    enabled: false

# Kubernetes Secret com as credenciais do Cloudinary.
# Criar o secret antes de implantar:
#   kubectl create secret generic nexo-be-cloudinary -n nexo-qa \
#     --from-literal=CLOUDINARY_CLOUD_NAME=xxx \
#     --from-literal=CLOUDINARY_API_KEY=xxx \
#     --from-literal=CLOUDINARY_API_SECRET=xxx \
#     --from-literal=CLOUDINARY_FOLDER=nexo
envFrom:
  - secretRef: nexo-be-cloudinary
